<div class="container">

  <h2>🚨 Admin Dashboard</h2>

  <!-- Buttons -->
  <div class="controls">
    <button class="primary" (click)="simulateAccess()">Simulate Access</button>
    <button class="danger" (click)="clearLogs()">Clear Logs</button>
  </div>

  <!-- Cards -->
  <div class="cards" *ngIf="!loading">
    <div class="card">
      <p>Total Alerts</p>
      <h3>{{ alerts.length }}</h3>
    </div>

    <div class="card high">
      <p>High Risk</p>
      <h3>{{ alerts.length }}</h3>
    </div>
  </div>

  <p *ngIf="loading" class="loading">Loading...</p>

  <!-- Table -->
  <div class="table-container" *ngIf="!loading && alerts.length > 0">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Score</th>
          <th>Level</th>
          <th>Reason</th>
          <th>Time</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let alert of alerts">
          <td>{{ alert.userId }}</td>
          <td>{{ alert.riskScore }}</td>

          <td>
            <span [ngClass]="alert.riskLevel.toLowerCase()">
              {{ alert.riskLevel }}
            </span>
          </td>

          <td class="reason">{{ alert.aiReason }}</td>
          <td>{{ alert.createdAt | date:'short' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <p *ngIf="!loading && alerts.length === 0">No alerts found</p>

</div>
